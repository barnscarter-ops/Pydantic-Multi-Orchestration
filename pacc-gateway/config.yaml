# PACC Model Gateway Routing Configuration
# This defines how requests are routed and when they should escalate.

default_local_model: "Gemma4-MaxCoder:latest"

routing_rules:
  - agent_role: "general"
    primary: "Gemma4-MaxCoder:latest"
    fallbacks:
      - "claude-3-5-sonnet"
      - "gpt-4o"
    escalation_thresholds:
      max_retries: 2
      confidence_score: 0.7 # If local model confidence is below this, escalate
      timeout_seconds: 30

  - agent_role: "coder"
    primary: "qwen2.5-coder:14b"
    fallbacks:
      - "claude-3-5-sonnet"
      - "gpt-4o"
    escalation_thresholds:
      max_retries: 1
      confidence_score: 0.8
      timeout_seconds: 45
